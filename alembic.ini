# A generic, single database configuration for Alembic.
# BUG FIX: script_location was set to `src/database/migrations` but migrations
# actually live at `database/migrations` (project root level, not under src/).

[alembic]
# path to migration scripts
script_location = database/migrations

# template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# set to 'true' to run the environment during the 'revision' command
revision_environment = true

# sqlalchemy.url is intentionally left empty here because the URL is loaded
# programmatically from environment variables in env.py
sqlalchemy.url =

[post_write_hooks]
# post_write_hooks defines scripts or calls that are run
# after migrations are generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
