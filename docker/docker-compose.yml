version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: investment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  redis:
    image: redis:7-alpine
    container_name: investment_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bot_network

  bot:
    build:
      context: ..
      dockerfile: docker/bot.Dockerfile
    container_name: investment_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: investment_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

  cron:
    build:
      context: ..
      dockerfile: docker/cron.Dockerfile
    container_name: investment_cron
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
