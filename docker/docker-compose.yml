version: "3.9"

# BUG FIX: env_file was set to `.env` but docker-compose.yml lives in docker/ subdirectory.
# When running `docker compose -f docker/docker-compose.yml up`, the .env file path
# must be relative to the project root, not the docker/ directory.
# Fixed by using `../.env` for all services.

services:
  postgres:
    image: postgres:16-alpine
    container_name: investment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  redis:
    image: redis:7-alpine
    container_name: investment_redis
    restart: unless-stopped
    # BUG FIX: Added requirepass to enforce auth when REDIS_PASSWORD is set
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ]; then redis-server --appendonly yes --requirepass $$REDIS_PASSWORD; else redis-server --appendonly yes; fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bot_network

  bot:
    build:
      context: ..
      dockerfile: docker/bot.Dockerfile
    container_name: investment_bot
    restart: unless-stopped
    # BUG FIX: Changed `.env` -> `../.env` since compose file is in docker/ subdirectory
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Expose health check port (matched in bot.Dockerfile HEALTHCHECK)
      - "8080:8080"
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: investment_worker
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

  cron:
    build:
      context: ..
      dockerfile: docker/cron.Dockerfile
    container_name: investment_cron
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
